<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业认证 · 产品文档中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 90%;
            padding: 48px 0;
        }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header .icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 8px;
        }
        .header .subtitle {
            font-size: 15px;
            color: #94a3b8;
        }
        .header .badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 28px 32px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            backdrop-filter: blur(12px);
        }
        .card:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .card-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .card-icon.prd { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .card-icon.pc { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .card-icon.mini { background: linear-gradient(135deg, #10b981, #059669); }
        .card-body { flex: 1; }
        .card-body h2 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .card-body .desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }
        .card-body .meta {
            margin-top: 8px;
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #64748b;
        }
        .card-body .meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .card-arrow {
            font-size: 20px;
            color: #475569;
            transition: all 0.3s ease;
        }
        .card:hover .card-arrow {
            color: #60a5fa;
            transform: translateX(4px);
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📋</div>
            <h1>企业认证 · 产品文档中心</h1>
            <p class="subtitle">启泰集采商城 · e签宝企业认证功能</p>
            <span class="badge">PRD v7.3 · 原型 v7.1</span>
        </div>
        <div class="cards">
            <a class="card" href="./prd.html" target="_blank">
                <div class="card-icon prd">📄</div>
                <div class="card-body">
                    <h2>PRD 需求文档</h2>
                    <p class="desc">企业认证功能完整需求说明，含业务流程、接口规范、状态机、验收标准</p>
                    <div class="meta">
                        <span>📌 v7.3</span>
                        <span>🕐 2026-04-28</span>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
            <a class="card" href="./pc-prototype.html" target="_blank">
                <div class="card-icon pc">🖥</div>
                <div class="card-body">
                    <h2>PC端原型</h2>
                    <p class="desc">Web端企业认证交互原型，4步流程，含场景一/二完整页面与状态流转</p>
                    <div class="meta">
                        <span>📌 v7.1</span>
                        <span>🕐 2026-04-28</span>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
            <a class="card" href="./mini-prototype.html" target="_blank">
                <div class="card-icon mini">📱</div>
                <div class="card-body">
                    <h2>小程序端原型</h2>
                    <p class="desc">微信小程序端企业认证交互原型，3步流程，含底部弹窗与分页表单</p>
                    <div class="meta">
                        <span>📌 v7.1</span>
                        <span>🕐 2026-04-28</span>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
        </div>
        <div class="footer">
            启泰智能 · 数智聚模商城
        </div>
    </div>
</body>
</html>
